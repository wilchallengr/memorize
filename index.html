<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mémorize — Apprendre par la répétition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --card: #1f1f26;
    --border: #2e2e38;
    --accent: #c8f060;
    --accent2: #60b8f0;
    --red: #f06060;
    --text: #f0ede6;
    --muted: #6e6e80;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── SCREENS ─────────────────────────────── */
  .screen { display: none; width: 100%; max-width: 700px; padding: 24px 20px; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; }

  /* ─── HEADER ──────────────────────────────── */
  header {
    text-align: center;
    padding: 48px 20px 0;
    position: relative;
    z-index: 1;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline { font-size: 0.75rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }

  /* ─── CARDS / SURFACES ────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  /* ─── HOME SCREEN ─────────────────────────── */
  #screen-home { gap: 20px; padding-top: 28px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Preset buttons */
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    text-align: left;
    transition: border-color .2s, background .2s;
  }
  .preset-btn:hover { border-color: var(--accent); background: #1f1f26; }
  .preset-btn .preset-icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }
  .preset-btn .preset-name { display: block; font-weight: 500; }
  .preset-btn .preset-count { display: block; font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  /* Custom data textarea */
  .input-block { display: flex; flex-direction: column; gap: 8px; }
  textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    min-height: 120px;
    transition: border-color .2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  .hint { font-size: 0.68rem; color: var(--muted); }

  /* ─── BUTTONS ─────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 13px 24px;
    transition: transform .15s, opacity .2s, background .2s;
    letter-spacing: .5px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0e0e10; }
  .btn-primary:hover { opacity: .88; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-next { background: var(--accent2); color: #0e0e10; }
  .btn-full { width: 100%; }

  /* ─── QUIZ SCREEN ─────────────────────────── */
  #screen-quiz { gap: 18px; padding-top: 20px; }

  .progress-row { display: flex; align-items: center; gap: 12px; }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .progress-text { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }

  /* Stats row */
  .stats-row { display: flex; gap: 10px; }
  .stat-chip {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.68rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip span { font-size: 1rem; font-weight: 500; color: var(--text); }
  .stat-chip.good span { color: var(--accent); }
  .stat-chip.bad span { color: var(--red); }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .3s;
  }
  .question-card.correct { border-color: var(--accent); }
  .question-card.wrong { border-color: var(--red); }

  .question-label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 700;
    line-height: 1.2;
  }

  .card-score {
    display: flex;
    gap: 10px;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .card-score .cs-ok { color: var(--accent); }
  .card-score .cs-ko { color: var(--red); }
  .card-score:empty { display: none; }
  .answer-reveal {
    display: none;
    margin-top: 12px;
    padding: 10px 18px;
    background: rgba(96,184,240,.1);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--accent2);
    animation: fadeIn .3s ease;
  }
  .answer-reveal.visible { display: block; }

  /* Choice buttons */
  .choices-row { display: flex; gap: 12px; }
  .choice-btn {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 20px 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent2); background: var(--card); }
  .choice-btn:active:not(:disabled) { transform: scale(.97); }
  .choice-btn.correct { border-color: var(--accent); background: rgba(200,240,96,.08); color: var(--accent); }
  .choice-btn.wrong   { border-color: var(--red);    background: rgba(240,96,96,.08);  color: var(--red); }
  .choice-btn.reveal  { border-color: var(--accent); background: rgba(200,240,96,.08); color: var(--accent); }
  .choice-btn:disabled { cursor: default; }

  /* Feedback toast */
  .feedback {
    text-align: center;
    font-size: 0.78rem;
    height: 22px;
    transition: opacity .2s;
  }
  .feedback.correct { color: var(--accent); }
  .feedback.wrong { color: var(--red); }

  /* Action row */
  .action-row { display: flex; gap: 10px; }

  /* ─── RESULTS SCREEN ──────────────────────── */
  #screen-results { gap: 20px; padding-top: 40px; align-items: center; text-align: center; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 3.5rem);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-sub { font-size: 0.78rem; color: var(--muted); }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .result-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .result-stat .rs-val {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
  }
  .result-stat .rs-val.green { color: var(--accent); }
  .result-stat .rs-val.red { color: var(--red); }
  .result-stat .rs-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .result-actions { display: flex; gap: 10px; width: 100%; }

  /* ─── ANIMATIONS ──────────────────────────── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .anim-shake { animation: shake .35s ease; }
  .anim-pop { animation: pop .3s ease; }

  /* ─── RESPONSIVE ──────────────────────────── */
  @media (max-width: 420px) {
    .preset-grid { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Mémorize</div>
  <div class="tagline">Apprendre par la répétition</div>
</header>

<!-- ══════════════ HOME ══════════════ -->
<div class="screen active" id="screen-home">

  <div class="section-label">Jeux de données prêts</div>
  <div class="preset-grid" id="preset-grid"></div>

  <div class="card" style="margin-top:4px;">
    <div class="section-label">Données personnalisées</div>
    <div class="input-block">
      <textarea id="custom-input" placeholder="chat → cat&#10;chien → dog&#10;maison → house"></textarea>
      <div class="hint">Format : <strong>question → réponse</strong>, une paire par ligne. La réponse peut contenir plusieurs valeurs séparées par <strong>/</strong> (ex: 3×4 → 12/douze).</div>
    </div>
  </div>

  <div style="display:flex; gap:10px;">
    <button class="btn btn-primary btn-full" onclick="startCustom()">▶ Commencer</button>
  </div>
</div>

<!-- ══════════════ QUIZ ══════════════ -->
<div class="screen" id="screen-quiz">

  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <div class="progress-text" id="prog-text">0 / 0</div>
  </div>

  <div class="stats-row">
    <div class="stat-chip" id="chip-unseen">🃏 <span id="stat-unseen">0</span> à découvrir</div>
    <div class="stat-chip bad" id="chip-repair">🔁 <span id="stat-repair">0</span> à consolider</div>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-label">Question</div>
    <div class="question-text" id="question-text">—</div>
    <div class="card-score" id="card-score"></div>
    <div class="answer-reveal" id="answer-reveal"></div>
  </div>

  <div class="choices-row" id="choices-row">
    <button class="choice-btn" id="choice-a" onclick="pickChoice(0)"></button>
    <button class="choice-btn" id="choice-b" onclick="pickChoice(1)"></button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="action-row">
    <button class="btn btn-ghost" onclick="goHome()" style="flex:0 0 auto;">← Menu</button>
    <button class="btn btn-next btn-full" id="btn-next" onclick="nextCard()" style="display:none;">Suivant →</button>
  </div>

</div>

<!-- ══════════════ RESULTS ══════════════ -->
<div class="screen" id="screen-results">
  <div class="result-title" id="res-emoji">🏆</div>
  <div class="result-title" id="res-score"></div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-grid">
    <div class="result-stat"><div class="rs-val green" id="res-correct">0</div><div class="rs-label">Correctes</div></div>
    <div class="result-stat"><div class="rs-val red" id="res-wrong">0</div><div class="rs-label">Erreurs</div></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-ghost" onclick="goHome()">← Menu</button>
    <button class="btn btn-primary btn-full" onclick="restart()">↺ Rejouer</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// PRESETS
// ═══════════════════════════════════════════════════
const PRESETS = [
  {
    icon: '🇬🇧',
    name: 'Vocabulaire FR→EN',
    data: [
      ['chat','cat'],['chien','dog'],['maison','house'],['voiture','car'],
      ['arbre','tree']
    ]
  }
];

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const MASTERY_THRESHOLD = 5; // correct answers needed to master a card that had errors

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
// Each card object: { q, a, id,
//   everWrong: bool,        — had at least one error
//   masteryCount: int,      — consecutive correct answers since last error
//   mastered: bool,         — done with repetition
//   firstTry: bool|null,    — true if answered right on very first attempt
// }
let queue = [];             // active question queue (indices into cards[])
let cards = [];             // master card list
let answered = false;
let correctCount = 0;       // correct answers in current session
let wrongCount = 0;         // wrong answers in current session
let currentPreset = null;
let phase = 'main';         // 'main' | 'review'
let reviewDone = false;
let originalCards = [];     // saved for restart

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init() {
  const grid = document.getElementById('preset-grid');
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.innerHTML = `<span class="preset-icon">${p.icon}</span>
      <span class="preset-name">${p.name}</span>
      <span class="preset-count">${p.data.length} cartes</span>`;
    btn.onclick = () => startPreset(i);
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { showScreen('screen-home'); }

// ═══════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════
function startPreset(i) {
  currentPreset = i;
  const raw = PRESETS[i].data.map(([q, a], idx) => makeCard(q, a.toString(), idx));
  launchDeck(shuffle([...raw]));
}

function startCustom() {
  const text = document.getElementById('custom-input').value.trim();
  if (!text) { alert('Veuillez entrer des données ou choisir un jeu prêt.'); return; }
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const pairs = [];
  for (const line of lines) {
    const sep = line.includes('→') ? '→' : line.includes('->') ? '->' : line.includes(':') ? ':' : null;
    if (!sep) continue;
    const i2 = line.indexOf(sep);
    const q = line.slice(0, i2).trim();
    const a = line.slice(i2 + sep.length).trim();
    if (q && a) pairs.push(makeCard(q, a, pairs.length));
  }
  if (!pairs.length) { alert('Format invalide. Utilisez "question → réponse".'); return; }
  currentPreset = null;
  launchDeck(shuffle(pairs));
}

function makeCard(q, aRaw, id) {
  return {
    id,
    q,
    a: aRaw.toLowerCase().split('/').map(s => s.trim()),
    everWrong: false,
    masteryCount: 0,
    mastered: false,
    firstTry: null,   // null = not yet shown, true/false after first attempt
    cardCorrect: 0,   // correct answers for this card
    cardWrong: 0,     // wrong answers for this card
  };
}

function launchDeck(d) {
  cards = d;
  originalCards = d.map(c => ({ ...c }));
  // queue holds card IDs in order
  queue = cards.map(c => c.id);
  phase = 'main';
  reviewDone = false;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  showScreen('screen-quiz');
  updateStats();
  showCard();
}

function restart() {
  if (currentPreset !== null) { startPreset(currentPreset); }
  else {
    const fresh = originalCards.map(c => ({ ...c, everWrong: false, masteryCount: 0, mastered: false, firstTry: null }));
    launchDeck(shuffle(fresh));
  }
}

// ═══════════════════════════════════════════════════
// CARD DISPLAY
// ═══════════════════════════════════════════════════
function currentCard() {
  return cards.find(c => c.id === queue[0]);
}

function showCard() {
  const card = currentCard();
  answered = false;

  const qCard = document.getElementById('question-card');
  qCard.className = 'question-card';

  // Phase label
  const phaseLabel = phase === 'review' ? 'Révision finale' : 'Question';
  document.querySelector('.question-label').textContent = phaseLabel;

  document.getElementById('question-text').textContent = card.q;

  // Per-card score
  const cs = document.getElementById('card-score');
  if (card.cardCorrect === 0 && card.cardWrong === 0) {
    cs.innerHTML = '';
  } else {
    cs.innerHTML = `<span class="cs-ok">✓ ${card.cardCorrect}</span><span class="cs-ko">✗ ${card.cardWrong}</span>`;
  }
  document.getElementById('answer-reveal').className = 'answer-reveal';
  document.getElementById('answer-reveal').textContent = '';

  // Build 2 choices: correct answer + 1 random distractor from other cards
  const correctAnswer = card.a[0];
  const distractors = cards
    .filter(c => c.id !== card.id)
    .map(c => c.a[0]);
  const distractor = distractors[Math.floor(Math.random() * distractors.length)] || '—';
  const choices = shuffle([correctAnswer, distractor]);

  const btnA = document.getElementById('choice-a');
  const btnB = document.getElementById('choice-b');
  btnA.textContent = choices[0];
  btnB.textContent = choices[1];
  btnA.className = 'choice-btn';
  btnB.className = 'choice-btn';
  btnA.disabled = false;
  btnB.disabled = false;
  btnA.dataset.value = choices[0];
  btnB.dataset.value = choices[1];

  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  updateProgress();
}

// ═══════════════════════════════════════════════════
// PICK CHOICE
// ═══════════════════════════════════════════════════
function pickChoice(btnIndex) {
  if (answered) return;
  const card = currentCard();
  const btnA = document.getElementById('choice-a');
  const btnB = document.getElementById('choice-b');
  const btns = [btnA, btnB];
  const picked = btns[btnIndex].dataset.value;
  const ok = card.a.includes(picked);

  answered = true;
  btnA.disabled = true;
  btnB.disabled = true;

  const qCard = document.getElementById('question-card');

  // Always highlight which one was correct
  btns.forEach(b => {
    if (card.a.includes(b.dataset.value)) b.classList.add('reveal');
  });

  if (ok) {
    correctCount++;
    card.cardCorrect++;
    if (card.firstTry === null) card.firstTry = true;
    btns[btnIndex].className = 'choice-btn correct';

    if (card.everWrong && !card.mastered) {
      card.masteryCount++;
      if (card.masteryCount >= MASTERY_THRESHOLD) {
        card.mastered = true;
        setFeedback(`✓ Maîtrisé ! (${MASTERY_THRESHOLD}/${MASTERY_THRESHOLD})`, 'correct');
      } else {
        setFeedback(`✓ Bonne réponse ! (${card.masteryCount}/${MASTERY_THRESHOLD} pour maîtriser)`, 'correct');
      }
    } else {
      setFeedback('✓ Bonne réponse !', 'correct');
    }

    qCard.className = 'question-card correct';
    qCard.classList.add('anim-pop');
    updateProgress();
    setTimeout(() => { qCard.classList.remove('anim-pop'); advance(true); }, 700);
  } else {
    wrongCount++;
    card.cardWrong++;
    if (card.firstTry === null) card.firstTry = false;
    card.everWrong = true;
    card.masteryCount = 0;

    // Re-inject retired clean cards as spacers
    if (phase === 'main') {
      const inQueue = new Set(queue);
      const retired = cards.filter(c => !c.everWrong && !inQueue.has(c.id) && c.id !== card.id);
      retired.forEach(rc => {
        const insertAt = 1 + Math.floor(Math.random() * Math.max(1, queue.length));
        queue.splice(insertAt, 0, rc.id);
      });
    }

    btns[btnIndex].className = 'choice-btn wrong';
    qCard.className = 'question-card wrong';
    qCard.classList.add('anim-shake');
    setTimeout(() => qCard.classList.remove('anim-shake'), 400);

    if (phase === 'main') {
      setFeedback(`✗ Erreur — on y reviendra jusqu'à ${MASTERY_THRESHOLD} bonnes réponses`, 'wrong');
    } else {
      setFeedback('✗ Mauvaise réponse', 'wrong');
    }
    document.getElementById('btn-next').style.display = '';
  }

  updateStats();
}

// Called after correct answer (auto) or manual next button
function advance(wasCorrect) {
  const card = currentCard();

  if (phase === 'main') {
    queue.shift();

    const isErrorCard = card.everWrong && !card.mastered;
    const isCleanCard = !card.everWrong; // never made an error on this card

    if (!wasCorrect || isErrorCard) {
      // Error card (or just got it wrong): re-insert spaced 2..5 positions ahead
      const spacing = Math.floor(Math.random() * 4) + 2;
      const insertAt = Math.min(spacing, queue.length);
      queue.splice(insertAt, 0, card.id);
    } else if (isCleanCard) {
      // Correct clean card: re-insert in the queue as long as there are
      // unmastered error cards that need spacing. Position = random in 2nd half.
      const hasActiveErrors = cards.some(c => c.everWrong && !c.mastered);
      if (hasActiveErrors) {
        const lo = Math.max(2, Math.floor(queue.length * 0.4));
        const hi = queue.length;
        const insertAt = lo + Math.floor(Math.random() * (hi - lo + 1));
        queue.splice(Math.min(insertAt, queue.length), 0, card.id);
      }
      // else: no more errors to space → card retires permanently
    }
    // mastered error card: don't re-insert

    const allSeen = cards.every(c => c.firstTry !== null);
    const allResolved = cards.every(c => c.mastered || !c.everWrong);

    if (queue.length === 0 || (allSeen && allResolved)) {
      startReviewPhase();
      return;
    }
  } else {
    queue.shift();
    if (queue.length === 0) {
      showResults();
      return;
    }
  }

  showCard();
}

function nextCard() {
  advance(false);
}

function startReviewPhase() {
  const toReview = cards.filter(c => c.everWrong);
  if (toReview.length === 0) {
    showResults();
    return;
  }
  phase = 'review';
  queue = shuffle(toReview.map(c => c.id));
  // Reset mastery counts for review (they need to answer once correctly)
  showReviewTransition(toReview.length);
}

function showReviewTransition(count) {
  const qCard = document.getElementById('question-card');
  const questionText = document.getElementById('question-text');

  qCard.className = 'question-card';
  questionText.innerHTML = `<span style="font-size:1rem; font-family: DM Mono, monospace; color: var(--accent2)">Phase de révision finale</span><br>${count} carte${count>1?'s':''} à revoir`;
  document.querySelector('.question-label').textContent = '⟳ Révision';
  document.getElementById('card-score').innerHTML = '';

  // Hide choice buttons during transition
  document.getElementById('choice-a').style.visibility = 'hidden';
  document.getElementById('choice-b').style.visibility = 'hidden';
  document.getElementById('answer-reveal').className = 'answer-reveal';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btn-next').style.display = '';
  document.getElementById('btn-next').textContent = 'Commencer →';

  document.getElementById('btn-next').onclick = () => {
    document.getElementById('choice-a').style.visibility = '';
    document.getElementById('choice-b').style.visibility = '';
    document.getElementById('btn-next').textContent = 'Suivant →';
    document.getElementById('btn-next').onclick = nextCard;
    showCard();
  };
}

function setFeedback(msg, cls) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = 'feedback ' + cls;
}

// ═══════════════════════════════════════════════════
// PROGRESS & STATS
// ═══════════════════════════════════════════════════
function updateProgress() {
  const total = cards.length;
  const done = cards.filter(c => (c.firstTry === true && !c.everWrong) || c.mastered).length;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${done}/${total} maîtrisés`;
}

function updateStats() {
  // Cards not yet seen even once
  const unseen = cards.filter(c => c.firstTry === null).length;
  // Total correct answers still needed to consolidate all error cards
  const toConsolidate = cards
    .filter(c => c.everWrong && !c.mastered)
    .reduce((sum, c) => sum + (MASTERY_THRESHOLD - c.masteryCount), 0);

  document.getElementById('stat-unseen').textContent = unseen;
  document.getElementById('stat-repair').textContent = toConsolidate;
  document.getElementById('chip-unseen').style.opacity = unseen > 0 ? '1' : '0.35';
  document.getElementById('chip-repair').style.opacity = toConsolidate > 0 ? '1' : '0.35';
}

// ═══════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════
function showResults() {
  const total = cards.length;
  const firstTryOk = cards.filter(c => c.firstTry === true).length;
  const hadErrors = cards.filter(c => c.everWrong).length;
  const pct = total ? Math.round((firstTryOk / total) * 100) : 0;
  const emoji = pct === 100 ? '🏆' : pct >= 80 ? '🎯' : pct >= 60 ? '📈' : '💪';
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-sub').textContent = `${firstTryOk} carte${firstTryOk>1?'s':''} connues du premier coup sur ${total}`;
  document.getElementById('res-correct').textContent = firstTryOk;
  document.getElementById('res-wrong').textContent = hadErrors;

  // Update labels
  document.getElementById('res-correct').closest('.result-stat').querySelector('.rs-label').textContent = '1er coup';
  document.getElementById('res-wrong').closest('.result-stat').querySelector('.rs-label').textContent = 'Retravaillées';

  showScreen('screen-results');
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Keyboard shortcut: Enter to advance when "Suivant" is visible
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const btnNext = document.getElementById('btn-next');
    if (btnNext.style.display !== 'none') btnNext.click();
  }
});

init();
</script>
